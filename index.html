<style>

nt:center;gap:7px;color:var(--sub);font-size:13px;text-align:center;width:100%;height:100%;cursor:pointer}.plus{font-size:28px;color:var(--accent)}.sub{font-size:11px;color:var(--faint)}.photoStatus{margin-top:8px;font-size:12px;color:#f4c542;line-height:1.5}.stampNotice{margin-top:10px;padding:10px;border:1px dashed #3a4150;border-radius:10px;color:var(--sub);font-size:12px;line-height:1.6;background:rgba(255,255,255,.03)}.upload{display:block;text-align:center;margin-top:9px;font-size:13px;font-weight:700;background:var(--accent);border-radius:9px;padding:10px;cursor:pointer;position:relative;overflow:hidden}.upload input[type=file]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}.removeImg{position:absolute;top:6px;right:6px;width:28px;height:28px;border-radius:50%;border:none;background:rgba(0,0,0,.65);color:white;font-size:18px}.fields{display:flex;flex-direction:column;gap:13px}.field{display:flex;flex-direction:column;gap:6px}.field label{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.04em}input,textarea{background:#0d0f12;border:1px solid var(--line);border-radius:8px;color:var(--text);font:inherit;font-size:14px;padding:10px 12px}input:focus,textarea:focus{outline:none;border-color:var(--accent)}textarea{resize:vertical;min-height:72px;line-height:1.6}.range{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.num{font-family:ui-monospace,Menlo,monospace;font-size:18px;width:62px;text-align:center}.hint{font-size:11px;color:var(--faint)}.rowActions{display:flex;gap:10px;align-items:center}.spacer{flex:1}.important{display:flex;gap:7px;align-items:center;color:var(--sub);font-size:13px}.empty{text-align:center;padding:60px 20px;color:var(--sub)}.timeline{display:flex;flex-direction:column}.point{display:grid;grid-template-columns:84px 1fr;gap:14px}.rail{display:flex;flex-direction:column;align-items:center;position:relative;padding-top:14px}.numIndex{font-size:11px;color:var(--faint);font-weight:700;margin-bottom:6px}.dot{width:12px;height:12px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px var(--bg);z-index:2}.tc{font-family:ui-monospace,Menlo,monospace;font-size:14px;font-weight:700;color:var(--accent);margin-top:8px}.line{position:absolute;top:14px;bottom:-14px;width:2px;background:var(--line);z-index:1}.point:last-child .line{display:none}.card{display:flex;gap:14px;align-items:flex-start;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px;margin-bottom:14px}.point.importantPoint .card{border-color:rgba(224,71,61,.55);background:linear-gradient(180deg,rgba(224,71,61,.06),transparent)}.thumb{border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#0d0f12;flex:none;width:160px;height:100px;cursor:zoom-in}.thumb img{width:100%;height:100%;object-fit:cover}.body{flex:1;min-width:0}.clip{font-family:ui-monospace,Menlo,monospace;font-size:13px;font-weight:700;background:#0d0f12;border:1px solid var(--line);border-radius:6px;padding:4px 9px;display:inline-block;margin-bottom:8px;word-break:break-all}.tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:7px}.tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:6px;background:rgba(255,255,255,.07);color:var(--sub)}.imp{background:rgba(224,71,61,.16);color:var(--accent)}.inst{margin:0;line-height:1.65;white-space:pre-wrap;word-break:break-word}.cardActions{display:flex;flex-direction:column;gap:6px}.small{font-size:12px;color:var(--sub);background:transparent}.danger:hover{color:var(--accent)}.footer{text-align:center;color:var(--faint);font-size:12px;padding:18px}.modal{position:fixed;inset:0;z-index:50;background:rgba(8,9,11,.92);display:none;align-items:center;justify-content:center;padding:30px}.modal.show{display:flex}.modal>img{max-width:100%;max-height:90vh;border-radius:8px}.close{position:absolute;top:18px;right:18px}.resultBox{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:min(560px,92vw);max-height:88vh;overflow:auto;padding:18px}.resultHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-weight:700}.pages img{width:100%;border:1px solid var(--line);border-radius:8px;margin-top:12px}.stampTools{display:none;margin-top:10px;padding:10px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.04)}.stampTools.show{display:block}.stampTitle{font-size:12px;font-weight:700;color:var(--sub);margin-bottom:8px}.stampRows{display:flex;gap:7px;flex-wrap:wrap;align-items:center}.stampBtn,.colorBtn{min-width:42px;height:38px;border-radius:8px;border:1px solid var(--line);background:#0d0f12;color:var(--text);font:inherit;font-weight:800;cursor:pointer}.stampBtn.active{border-color:var(--accent);color:#fff;background:rgba(224,71,61,.22)}.colorBtn{min-width:34px;width:34px;padding:0}.colorBtn.active{outline:2px solid #fff;outline-offset:2px}.stampHint{font-size:12px;color:#f4c542;margin-top:8px;line-height:1.5}.paste.hasStamp img{cursor:crosshair}.miniBtn{height:38px;border-radius:8px;border:1px solid var(--line);background:var(--panelHi);color:var(--text);font:inherit;font-size:12px;font-weight:700;padding:0 10px;cursor:pointer}@media(max-width:640px){.grid{grid-template-columns:1fr}.point{grid-template-columns:60px 1fr}.card{flex-direction:column}.thumb{width:100%;height:auto;aspect-ratio:16/9}.cardActions{flex-direction:row}.tc{font-size:12px}}
</style>

<body>
<header class="header"><div class="left"><span class="rec"></span><input id="title" value="動画編集指示書" aria-label="タイトル"></div><div class="actions"><span id="saveState" class="hint"></span><button id="copyBtn" class="btn" disabled>指示書をコピー</button><button id="pdfBtn" class="btn primary" disabled>PDFを作成して送る</button></div></header>
<main class="main">
<section id="composer" class="composer"><div id="composerHead" class="head">新しいポイントを追加</div><div class="grid"><div><div class="paste" id="paste"><label class="emptyPhoto" for="file"><span class="plus">＋</span><span>タップして写真を選ぶ</span><span class="sub">PCはコピーして ⌘V でも貼り付け可</span></label></div><label class="upload" id="uploadLabel">写真を選ぶ / 撮影<input id="file" type="file" accept="image/*,.heic,.heif" autocomplete="off"></label><div id="stampNotice" class="stampNotice"><b>写真を選ぶとスタンプ編集できます</b><br>矢印・丸・四角・文字・色変更・戻す・全消しが使えます。</div><div id="stampTools" class="stampTools"><div class="stampTitle">スタンプ</div><div class="stampRows"><button type="button" class="stampBtn active" data-tool="arrow-r">→</button><button type="button" class="stampBtn" data-tool="arrow-l">←</button><button type="button" class="stampBtn" data-tool="arrow-u">↑</button><button type="button" class="stampBtn" data-tool="arrow-d">↓</button><button type="button" class="stampBtn" data-tool="curve-dr">⤿</button><button type="button" class="stampBtn" data-tool="curve-dl">⤾</button><button type="button" class="stampBtn" data-tool="circle">○</button><button type="button" class="stampBtn" data-tool="rect">□</button><button type="button" class="stampBtn" data-tool="text">T</button><button type="button" class="miniBtn" id="undoStamp">戻す</button><button type="button" class="miniBtn" id="clearStamp">全消し</button></div><div class="stampRows" style="margin-top:8px"><button type="button" class="colorBtn active" data-color="#ffea00" style="background:#ffea00"></button><button type="button" class="colorBtn" data-color="#ff1717" style="background:#ff1717"></button><button type="button" class="colorBtn" data-color="#178cff" style="background:#178cff"></button><button type="button" class="colorBtn" data-color="#12c94b" style="background:#12c94b"></button><button type="button" class="colorBtn" data-color="#ffffff" style="background:#ffffff"></button></div><div class="stampHint">矢印は上下左右、下向き回転矢印も使えます。写真の上をタップすると配置できます。</div></div><div id="photoStatus" class="photoStatus"></div></div><div class="fields"><div class="field"><label>使う動画（ファイル名・タイトル）</label><input id="clip" placeholder="例：GX010008.MP4 ／ 順突き 基本"></div><div class="field"><label>使用区間（開始 〜 終了）</label><div class="range"><input id="inMin" class="num" inputmode="numeric" placeholder="分"><span>:</span><input id="inSec" class="num" inputmode="numeric" placeholder="秒"><span>〜</span><input id="outMin" class="num" inputmode="numeric" placeholder="分"><span>:</span><input id="outSec" class="num" inputmode="numeric" placeholder="秒"></div><span class="hint">分・秒を数字で入力（例：0 分 5 秒 → 0:05）</span></div><div class="field"><label>編集指示</label><textarea id="instruction" placeholder="例：突きが当たる瞬間でスロー。腰の回転に黄色い矢印を重ねる。"></textarea></div><div class="rowActions"><label class="important"><input id="important" type="checkbox">重要マーク</label><div class="spacer"></div><button id="cancelBtn" class="btn" style="display:none">キャンセル</button><button id="addBtn" class="btn primary" disabled>追加する</button></div></div></div></section>
<div id="list"></div><footer id="footer" class="footer"></footer>
</main>
<div id="lightbox" class="modal"><img id="lightImg"><button class="btn close" id="closeLight">閉じる ×</button></div>
<div id="resultModal" class="modal"><div class="resultBox"><div class="resultHead"><span>送信用PDFができました</span><button id="closeResult" class="btn">×</button></div><div class="actions"><button id="shareBtn" class="btn primary">共有 / LINEで送る</button><a id="openPdf" class="btn" target="_blank" download="動画編集指示書.pdf">PDFを開く</a></div><p class="hint">ボタンが効かない場合は、下のページ画像を長押しして「写真に追加」または「共有」→ LINE を選んでください。</p><div id="pages" class="pages"></div></div></div>
<script>
const $=id=>document.getElementById(id);const LS_META='vedit:meta';const LS_POINTS='vedit:points';let points=[];let editingId=null;let draftImage=null;let originalImage=null;let result=null;let stampTool='arrow-r';let stampColor='#ffea00';let stampHistory=[];
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function onlyNum(v,n){return String(v||'').replace(/\D/g,'').slice(0,n)}
function joinTc(m,s){m=onlyNum(m,3);s=onlyNum(s,2);if(!m&&!s)return'';if(!s)s='00';else if(s.length===1)s='0'+s;return(m||'0')+':'+s}
function splitTc(tc){if(!tc)return{m:'',s:''};let p=String(tc).split(':');return p.length===1?{m:'',s:p[0]}:{m:p[0],s:p[1]||''}}
function tcSec(tc){if(!tc)return null;let p=String(tc).split(':').map(x=>x.trim());if(p.some(x=>x===''||isNaN(Number(x))))return null;return p.reduce((a,b)=>a*60+Number(b),0)}
function rangeStr(p){let a=p.inPoint||p.timecode||'',b=p.outPoint||'';return a&&b?a+'–'+b:a?a+'–':b?'–'+b:''}
function sorted(){return points.map((p,i)=>({p,i,s:tcSec(p.inPoint)})).sort((a,b)=>{let av=a.s==null?Infinity:a.s,bv=b.s==null?Infinity:b.s;return av!==bv?av-bv:a.i-b.i}).map(x=>x.p)}
function save(){localStorage.setItem(LS_META,JSON.stringify({title:$('title').value}));localStorage.setItem(LS_POINTS,JSON.stringify(points));$('saveState').textContent='保存済み';setTimeout(()=>$('saveState').textContent='',1200)}
function load(){try{let m=JSON.parse(localStorage.getItem(LS_META)||'{}');if(m.title)$('title').value=m.title;points=JSON.parse(localStorage.getItem(LS_POINTS)||'[]')||[]}catch(e){points=[]}render()}
function compressImage(file){return new Promise((res,rej)=>{let img=new Image,url=URL.createObjectURL(file);img.onload=()=>{let w=img.width,h=img.height,max=1400;if(w>max){h=Math.round(h*max/w);w=max}let c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);URL.revokeObjectURL(url);res(c.toDataURL('image/jpeg',.82))};img.onerror=rej;img.src=url})}
function readFileDataURL(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(r.error||new Error('read error'));r.readAsDataURL(file)})}
async function setImage(file){
  if(!file)return;
  const st=$('photoStatus');
  if(st)st.textContent='写真を読み込み中…';
  try{
    // iPhoneのHEIC/大きい写真でcanvas圧縮が失敗することがあるため、まず元画像をそのままDataURL化して表示する
    draftImage=await readFileDataURL(file);
    originalImage=draftImage; stampHistory=[];
    renderDraftImage();
    checkAdd();
    if(st)st.textContent='写真を読み込みました。必要なら矢印・丸・文字を追加してください。';
    // JPEG/PNG/WebPだけ、裏で軽量化を試す。失敗しても表示済み画像は残す。
    if(/^image\/(jpeg|jpg|png|webp)$/i.test(file.type||'')){
      try{const compact=await compressImage(file); if(compact){draftImage=compact; originalImage=compact; stampHistory=[]; renderDraftImage(); checkAdd();}}catch(_e){}
    }
  }catch(e){
    if(st)st.textContent='写真を読み込めませんでした。iPhoneの場合は「写真」アプリで一度スクリーンショットにして、その画像を選んでください。';
    alert('写真を読み込めませんでした。別の写真、またはスクリーンショット/JPEGで試してください。');
  }
}
function renderDraftImage(){let p=$('paste');if(draftImage){p.classList.add('hasStamp');p.innerHTML='<img id="draftPhoto" src="'+draftImage+'" alt="選択した写真"><button class="removeImg" id="removeImg" type="button">×</button>';$('removeImg').onclick=()=>{draftImage=null;originalImage=null;stampHistory=[];renderDraftImage();checkAdd();if($('photoStatus'))$('photoStatus').textContent=''};$('uploadLabel').textContent='写真を変更';if($('stampNotice'))$('stampNotice').style.display='none';if($('stampTools'))$('stampTools').classList.add('show');setTimeout(()=>{let im=$('draftPhoto');if(im)im.onclick=placeStampFromEvent},0)}else{p.classList.remove('hasStamp');p.innerHTML='<button type="button" class="emptyPhoto" id="pickFromBox"><span class="plus">＋</span><span>タップして写真を選ぶ</span><span class="sub">PCはコピーして ⌘V でも貼り付け可</span></button>';$('uploadLabel').textContent='写真を選ぶ / 撮影';if($('stampNotice'))$('stampNotice').style.display='block';if($('stampTools'))$('stampTools').classList.remove('show');setTimeout(()=>{let b=$('pickFromBox');if(b)b.onclick=openPhotoPicker},0)}}
function loadImage(src){return new Promise((res,rej)=>{let im=new Image();im.onload=()=>res(im);im.onerror=rej;im.src=src})}
async function drawStamp(x,y){
  if(!draftImage)return;
  stampHistory.push(draftImage);
  let im=await loadImage(draftImage);
  let c=document.createElement('canvas');
  c.width=im.naturalWidth||im.width;
  c.height=im.naturalHeight||im.height;
  let ctx=c.getContext('2d');
  ctx.drawImage(im,0,0,c.width,c.height);

  // スマホ画面でも見やすいように、線を太めに設定
  let base=Math.min(c.width,c.height);
  let size=Math.max(58,base*0.18);
  let lw=Math.max(12,base*0.022);
  ctx.strokeStyle=stampColor;
  ctx.fillStyle=stampColor;
  ctx.lineWidth=lw;
  ctx.lineCap='round';
  ctx.lineJoin='round';

  function drawLineArrow(angle){
    const len=size*1.35;
    const head=size*0.36;
    const x1=x-Math.cos(angle)*len/2;
    const y1=y-Math.sin(angle)*len/2;
    const x2=x+Math.cos(angle)*len/2;
    const y2=y+Math.sin(angle)*len/2;
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.stroke();
    const a1=angle+Math.PI*0.78;
    const a2=angle-Math.PI*0.78;
    ctx.beginPath();
    ctx.moveTo(x2,y2);
    ctx.lineTo(x2+Math.cos(a1)*head,y2+Math.sin(a1)*head);
    ctx.lineTo(x2+Math.cos(a2)*head,y2+Math.sin(a2)*head);
    ctx.closePath();
    ctx.fill();
  }

  function drawDownCurveArrow(toRight){
    // ⤿ / ⤾ のような、下向きに回り込む太い矢印
    const r=size*0.52;
    const sx=toRight ? x-r*.82 : x+r*.82;
    const sy=y-r*.56;
    const ex=x;
    const ey=y+r*.68;
    const c1x=toRight ? x-r*.72 : x+r*.72;
    const c1y=y-r*.10;
    const c2x=toRight ? x-r*.18 : x+r*.18;
    const c2y=y+r*.58;
    ctx.beginPath();
    ctx.moveTo(sx,sy);
    ctx.bezierCurveTo(c1x,c1y,c2x,c2y,ex,ey);
    ctx.stroke();
    const head=size*0.38;
    const tangent=toRight ? Math.PI*.58 : Math.PI*.42; // 下向き先端に合う角度
    ctx.beginPath();
    ctx.moveTo(ex,ey);
    ctx.lineTo(ex+Math.cos(tangent+Math.PI*0.72)*head,ey+Math.sin(tangent+Math.PI*0.72)*head);
    ctx.lineTo(ex+Math.cos(tangent-Math.PI*0.72)*head,ey+Math.sin(tangent-Math.PI*0.72)*head);
    ctx.closePath();
    ctx.fill();
  }

  if(stampTool==='arrow-r'){drawLineArrow(0)}
  else if(stampTool==='arrow-l'){drawLineArrow(Math.PI)}
  else if(stampTool==='arrow-u'){drawLineArrow(-Math.PI/2)}
  else if(stampTool==='arrow-d'){drawLineArrow(Math.PI/2)}
  else if(stampTool==='curve-dr'){drawDownCurveArrow(true)}
  else if(stampTool==='curve-dl'){drawDownCurveArrow(false)}
  else if(stampTool==='circle'){
    ctx.beginPath();
    ctx.arc(x,y,size*.48,0,Math.PI*2);
    ctx.stroke();
  }else if(stampTool==='rect'){
    ctx.strokeRect(x-size*.50,y-size*.36,size*1.0,size*.72);
  }else{
    let t=prompt('入れる文字を入力してください','ここを強調');
    if(!t){stampHistory.pop();return}
    ctx.font='900 '+Math.round(size*.42)+'px sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.lineWidth=Math.max(5,lw*.5);
    ctx.strokeStyle='rgba(0,0,0,.70)';
    ctx.strokeText(t,x,y);
    ctx.fillStyle=stampColor;
    ctx.fillText(t,x,y);
  }
  draftImage=c.toDataURL('image/jpeg',.9);
  renderDraftImage();
  checkAdd();
}
function placeStampFromEvent(e){e.preventDefault();e.stopPropagation();let img=e.currentTarget,rect=img.getBoundingClientRect(),nw=img.naturalWidth,nh=img.naturalHeight;if(!nw||!nh)return;let boxW=rect.width,boxH=rect.height,imgRatio=nw/nh,boxRatio=boxW/boxH,drawW,drawH,offX=0,offY=0;if(boxRatio>imgRatio){drawH=boxH;drawW=drawH*imgRatio;offX=(boxW-drawW)/2}else{drawW=boxW;drawH=drawW/imgRatio;offY=(boxH-drawH)/2}let px=e.clientX-rect.left-offX,py=e.clientY-rect.top-offY;if(px<0||py<0||px>drawW||py>drawH)return;drawStamp(px/drawW*nw,py/drawH*nh)}
function initStampButtons(){document.querySelectorAll('[data-tool]').forEach(b=>b.onclick=()=>{stampTool=b.dataset.tool;document.querySelectorAll('[data-tool]').forEach(x=>x.classList.remove('active'));b.classList.add('active')});document.querySelectorAll('[data-color]').forEach(b=>b.onclick=()=>{stampColor=b.dataset.color;document.querySelectorAll('[data-color]').forEach(x=>x.classList.remove('active'));b.classList.add('active')});$('undoStamp').onclick=()=>{if(stampHistory.length){draftImage=stampHistory.pop();renderDraftImage();checkAdd()}};$('clearStamp').onclick=()=>{if(originalImage&&confirm('スタンプを全部消しますか？')){stampHistory.push(draftImage);draftImage=originalImage;renderDraftImage();checkAdd()}}}

function draft(){return{clip:$('clip').value,inPoint:joinTc($('inMin').value,$('inSec').value),outPoint:joinTc($('outMin').value,$('outSec').value),instruction:$('instruction').value,important:$('important').checked,image:draftImage}}
function clearDraft(){editingId=null;draftImage=null;originalImage=null;stampHistory=[];['clip','inMin','inSec','outMin','outSec','instruction'].forEach(id=>$(id).value='');$('important').checked=false;$('composer').classList.remove('editing');$('composerHead').textContent='新しいポイントを追加';$('addBtn').textContent='追加する';$('cancelBtn').style.display='none';renderDraftImage();checkAdd()}
function checkAdd(){$('addBtn').disabled=!$('instruction').value.trim()&&!draftImage}
function submit(){let d=draft();if(!d.instruction.trim()&&!d.image)return;if(editingId){d.id=editingId;points=points.map(p=>p.id===editingId?d:p)}else{d.id=uid();points.push(d)}clearDraft();save();render()}
function editPoint(id){let p=points.find(x=>x.id===id);if(!p)return;editingId=id;$('clip').value=p.clip||'';let a=splitTc(p.inPoint||''),b=splitTc(p.outPoint||'');$('inMin').value=a.m;$('inSec').value=a.s;$('outMin').value=b.m;$('outSec').value=b.s;$('instruction').value=p.instruction||'';$('important').checked=!!p.important;draftImage=p.image||null;originalImage=p.image||null;stampHistory=[];$('composer').classList.add('editing');$('composerHead').textContent='ポイントを編集';$('addBtn').textContent='更新する';$('cancelBtn').style.display='inline-block';renderDraftImage();checkAdd();scrollTo({top:0,behavior:'smooth'})}
function removePoint(id){points=points.filter(p=>p.id!==id);if(editingId===id)clearDraft();save();render()}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function render(){let l=$('list');$('copyBtn').disabled=points.length===0;$('pdfBtn').disabled=points.length===0;if(points.length===0){l.innerHTML='<div class="empty"><h3>まだポイントがありません</h3><p>動画のフレームをスクショして貼り付け、指示を書いて追加しましょう。</p></div>';$('footer').textContent='';return}l.innerHTML='<div class="timeline">'+sorted().map((p,i)=>'<article class="point '+(p.important?'importantPoint':'')+'"><div class="rail"><span class="numIndex">'+(i+1)+'</span><span class="dot"></span><span class="tc">'+esc(p.inPoint||'--:--')+'</span><span class="line"></span></div><div class="card">'+(p.image?'<button class="thumb" data-img="'+p.id+'"><img src="'+p.image+'"></button>':'')+'<div class="body">'+(p.clip?'<div class="clip">'+esc(p.clip)+'</div>':'')+'<div class="tags">'+(rangeStr(p)?'<span class="tag">'+esc(rangeStr(p))+'</span>':'')+(p.important?'<span class="tag imp">★ 重要</span>':'')+'</div><p class="inst">'+esc(p.instruction||'（指示未記入）')+'</p></div><div class="cardActions"><button class="btn small" data-edit="'+p.id+'">編集</button><button class="btn small danger" data-del="'+p.id+'">削除</button></div></div></article>').join('')+'</div>';$('footer').textContent=points.length+' ポイント・タイムコード順に表示中';document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>editPoint(b.dataset.edit));document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>removePoint(b.dataset.del));document.querySelectorAll('[data-img]').forEach(b=>b.onclick=()=>{let p=points.find(x=>x.id===b.dataset.img);$('lightImg').src=p.image;$('lightbox').classList.add('show')})}
function buildText(){let lines=['【'+$('title').value+'】','作成日: '+new Date().toLocaleDateString('ja-JP'),'ポイント数: '+points.length,''];sorted().forEach((p,i)=>{let parts=[];if(p.clip)parts.push('［'+p.clip+'］');if(rangeStr(p))parts.push(rangeStr(p));if(p.important)parts.push('★');lines.push((i+1)+'. '+parts.join(' '));(p.instruction||'（指示未記入）').split('\n').forEach(x=>lines.push('　'+x));lines.push('')});return lines.join('\n')}
async function copyText(){let t=buildText();try{await navigator.clipboard.writeText(t);$('copyBtn').textContent='コピーしました';setTimeout(()=>$('copyBtn').textContent='指示書をコピー',1500)}catch(e){prompt('以下をコピーしてください',t)}}
function wrap(ctx,text,max){let out=[];String(text).split('\n').forEach(para=>{if(para===''){out.push('');return}let line='';for(let ch of para){let test=line+ch;if(ctx.measureText(test).width>max&&line){out.push(line);line=ch}else line=test}out.push(line)});return out}
function loadImg(src){return new Promise(res=>{let im=new Image;im.onload=()=>res(im);im.onerror=()=>res(null);im.src=src})}
async function makePageImages(){let W=794,H=1123,M=48,scale=2,contentW=W-M*2,pages=[],canvas,ctx,y;let imgs={};for(let p of points)if(p.image)imgs[p.id]=await loadImg(p.image);function newPage(){canvas=document.createElement('canvas');canvas.width=W*scale;canvas.height=H*scale;ctx=canvas.getContext('2d');ctx.scale(scale,scale);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);ctx.textBaseline='top';pages.push(canvas);y=M}newPage();ctx.fillStyle='#15171c';ctx.font='700 26px sans-serif';ctx.fillText($('title').value||'動画編集指示書',M,y);y+=38;ctx.fillStyle='#888';ctx.font='14px sans-serif';ctx.fillText('作成日 '+new Date().toLocaleDateString('ja-JP')+' ・ '+points.length+' ポイント',M,y);y+=26;ctx.strokeStyle='#ddd';ctx.beginPath();ctx.moveTo(M,y);ctx.lineTo(W-M,y);ctx.stroke();y+=20;let lineH=22;for(let [idx,p] of sorted().entries()){ctx.font='15px sans-serif';let instr=wrap(ctx,(p.instruction||'（指示未記入）').trim()||'（指示未記入）',contentW);let im=imgs[p.id],iw=0,ih=0;if(im&&im.width){iw=Math.min(contentW,440);ih=Math.round(im.height*iw/im.width);if(ih>360){ih=360;iw=Math.round(im.width*ih/im.height)}}let bh=28+(p.clip?22:0)+(im?ih+10:0)+instr.length*lineH+22;if(y+bh>H-M)newPage();ctx.fillStyle='#15171c';ctx.font='700 16px sans-serif';ctx.fillText((idx+1)+'.',M,y);let hx=M+ctx.measureText((idx+1)+'.  ').width;if(rangeStr(p)){ctx.fillStyle='#E0473D';ctx.fillText(rangeStr(p),hx,y);hx+=ctx.measureText(rangeStr(p)+'  ').width}if(p.important){ctx.fillStyle='#E0473D';ctx.fillText('★',hx,y)}y+=28;if(p.clip){ctx.fillStyle='#444';ctx.font='600 14px monospace';ctx.fillText(p.clip,M,y);y+=22}if(im&&iw){ctx.drawImage(im,M,y,iw,ih);ctx.strokeStyle='#ddd';ctx.strokeRect(M,y,iw,ih);y+=ih+10}ctx.fillStyle='#222';ctx.font='15px sans-serif';instr.forEach(ln=>{ctx.fillText(ln,M,y);y+=lineH});y+=12;ctx.strokeStyle='#eee';ctx.beginPath();ctx.moveTo(M,y-6);ctx.lineTo(W-M,y-6);ctx.stroke();y+=8}return pages.map(c=>c.toDataURL('image/jpeg',.85))}
function dataUrlBytes(d){let bin=atob(d.split(',')[1]||''),u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u}
function pdfFromImages(imgs){let enc=new TextEncoder,chunks=[],len=0,off={},out=x=>{let u=typeof x==='string'?enc.encode(x):x;chunks.push(u);len+=u.length},N=imgs.length,pageW=595,imgN=i=>3+i*3,contN=i=>4+i*3,pageN=i=>5+i*3;out('%PDF-1.4\n');off[1]=len;out('1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n');off[2]=len;out('2 0 obj\n<< /Type /Pages /Kids ['+imgs.map((_,i)=>pageN(i)+' 0 R').join(' ')+'] /Count '+N+' >>\nendobj\n');imgs.forEach((d,i)=>{let bytes=dataUrlBytes(d),im=new Image;let w=1588,h=2246,ph=Math.round(pageW*h/w);off[imgN(i)]=len;out(imgN(i)+' 0 obj\n<< /Type /XObject /Subtype /Image /Width '+w+' /Height '+h+' /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length '+bytes.length+' >>\nstream\n');out(bytes);out('\nendstream\nendobj\n');let content='q '+pageW+' 0 0 '+ph+' 0 0 cm /Im0 Do Q';off[contN(i)]=len;out(contN(i)+' 0 obj\n<< /Length '+content.length+' >>\nstream\n'+content+'\nendstream\nendobj\n');off[pageN(i)]=len;out(pageN(i)+' 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 '+pageW+' '+ph+'] /Resources << /XObject << /Im0 '+imgN(i)+' 0 R >> >> /Contents '+contN(i)+' 0 R >>\nendobj\n')});let total=2+N*3,xref=len,s='xref\n0 '+(total+1)+'\n0000000000 65535 f \n';for(let n=1;n<=total;n++)s+=String(off[n]||0).padStart(10,'0')+' 00000 n \n';out(s);out('trailer\n<< /Size '+(total+1)+' /Root 1 0 R >>\nstartxref\n'+xref+'\n%%EOF');let u=new Uint8Array(len),p=0;chunks.forEach(c=>{u.set(c,p);p+=c.length});return new Blob([u],{type:'application/pdf'})}
async function preparePdf(){if(!points.length)return;$('pdfBtn').textContent='作成中…';$('pdfBtn').disabled=true;try{let imgs=await makePageImages(),blob=pdfFromImages(imgs),name=($('title').value||'編集指示書').replace(/[\\/:*?"<>|]/g,'_').slice(0,60)+'.pdf',file=new File([blob],name,{type:'application/pdf'}),url=URL.createObjectURL(blob);if(result&&result.url)URL.revokeObjectURL(result.url);result={file,url,name,imgs};$('openPdf').href=url;$('openPdf').download=name;$('pages').innerHTML=imgs.map((src,i)=>'<img src="'+src+'" alt="ページ '+(i+1)+'">').join('');$('resultModal').classList.add('show')}catch(e){alert('PDFの作成に失敗しました。もう一度お試しください。')}finally{$('pdfBtn').textContent='PDFを作成して送る';$('pdfBtn').disabled=points.length===0}}
async function sharePdf(){if(!result)return;try{if(navigator.canShare&&navigator.canShare({files:[result.file]}))await navigator.share({files:[result.file],title:$('title').value||'編集指示書'});else alert('このブラウザでは直接共有できません。PDFを開くか、ページ画像を長押ししてください。')}catch(e){}}
['inMin','inSec','outMin','outSec'].forEach(id=>$(id).addEventListener('input',e=>e.target.value=onlyNum(e.target.value,id.includes('Min')?3:2)));$('instruction').oninput=checkAdd;$('addBtn').onclick=submit;$('cancelBtn').onclick=clearDraft;$('file').addEventListener('change',e=>{const f=e.target.files&&e.target.files[0];setImage(f);});
function openPhotoPicker(){let f=$('file');if(!f)return;f.value='';f.click()}
$('paste').addEventListener('click',e=>{if(e.target&&e.target.id==='removeImg')return;if(draftImage&&e.target&&e.target.id==='draftPhoto')return;openPhotoPicker()});
$('copyBtn').onclick=copyText;$('pdfBtn').onclick=preparePdf;$('shareBtn').onclick=sharePdf;$('title').oninput=save;$('closeLight').onclick=()=>$('lightbox').classList.remove('show');$('lightbox').onclick=e=>{if(e.target.id==='lightbox')$('lightbox').classList.remove('show')};$('closeResult').onclick=()=>$('resultModal').classList.remove('show');$('resultModal').onclick=e=>{if(e.target.id==='resultModal')$('resultModal').classList.remove('show')};window.addEventListener('paste',async e=>{let items=e.clipboardData&&e.clipboardData.items;if(!items)return;for(let it of items){if(it.type&&it.type.indexOf('image')===0){let f=it.getAsFile();if(f){e.preventDefault();await setImage(f)}return}}});initStampButtons();load();
</script>
